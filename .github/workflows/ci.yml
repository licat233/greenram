name: macOS CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: macos-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show Swift version
        run: swift --version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Run tests
        run: swift test

      - name: Build release
        run: swift build -c release

      - name: Assemble test app
        run: |
          APP_ROOT="$RUNNER_TEMP/GreenRAM.app"
          mkdir -p "$APP_ROOT/Contents/MacOS" "$APP_ROOT/Contents/Resources"
          cp .build/release/GreenRAM "$APP_ROOT/Contents/MacOS/GreenRAM"
          cp Packaging/GreenRAM-Info.plist "$APP_ROOT/Contents/Info.plist"
          cp Packaging/GreenRAM.icns "$APP_ROOT/Contents/Resources/GreenRAM.icns"
          codesign --force --deep --sign - "$APP_ROOT"
          ditto -c -k --keepParent "$APP_ROOT" "$RUNNER_TEMP/GreenRAM-0.13.0-test.app.zip"

      - name: Upload test app
        uses: actions/upload-artifact@v4
        with:
          name: GreenRAM-0.13.0-test
          path: ${{ runner.temp }}/GreenRAM-0.13.0-test.app.zip
          if-no-files-found: error
          retention-days: 14
