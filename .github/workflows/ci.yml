name: macOS CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: macos-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show Swift version
        run: swift --version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Run tests
        run: swift test

      - name: Build Universal 2 release
        run: |
          swift build -c release --arch arm64 --scratch-path .build-arm64
          swift build -c release --arch x86_64 --scratch-path .build-x86_64
          lipo -create \
            .build-arm64/arm64-apple-macosx/release/GreenRAM \
            .build-x86_64/x86_64-apple-macosx/release/GreenRAM \
            -output "$RUNNER_TEMP/GreenRAM"
          lipo -info "$RUNNER_TEMP/GreenRAM"

      - name: Assemble Universal 2 test app
        run: |
          APP_ROOT="$RUNNER_TEMP/GreenRAM.app"
          mkdir -p "$APP_ROOT/Contents/MacOS" "$APP_ROOT/Contents/Resources"
          cp "$RUNNER_TEMP/GreenRAM" "$APP_ROOT/Contents/MacOS/GreenRAM"
          cp Packaging/GreenRAM-Info.plist "$APP_ROOT/Contents/Info.plist"
          cp Packaging/GreenRAM.icns "$APP_ROOT/Contents/Resources/GreenRAM.icns"
          codesign --force --deep --sign - "$APP_ROOT"
          ditto -c -k --keepParent "$APP_ROOT" "$RUNNER_TEMP/GreenRAM-0.13.0-test.app.zip"
          shasum -a 256 "$RUNNER_TEMP/GreenRAM-0.13.0-test.app.zip" > "$RUNNER_TEMP/GreenRAM-0.13.0-test.app.zip.sha256"

      - name: Upload test app
        uses: actions/upload-artifact@v4
        with:
          name: GreenRAM-0.13.0-test
          path: |
            ${{ runner.temp }}/GreenRAM-0.13.0-test.app.zip
            ${{ runner.temp }}/GreenRAM-0.13.0-test.app.zip.sha256
          if-no-files-found: error
          retention-days: 14

      - name: Publish personal-use GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v0.13.0"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists; leaving it unchanged."
          else
            gh release create "$TAG" \
              "$RUNNER_TEMP/GreenRAM-0.13.0-test.app.zip" \
              "$RUNNER_TEMP/GreenRAM-0.13.0-test.app.zip.sha256" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "GreenRAM v0.13.0 (Personal Use)" \
              --notes "Universal 2 build for the repository owner's personal Apple Silicon and Intel Macs. The app is ad-hoc signed and is not Apple-notarized. After copying GreenRAM.app to /Applications, first launch may require: xattr -dr com.apple.quarantine /Applications/GreenRAM.app"
          fi
